// === RENDER HELPERS ===
function badge(status) {
  const m = { "Not Found":"badge-red", "Found":"badge-green", "Minimal":"badge-yellow", "Claimed":"badge-green", "No Listing":"badge-red", "Active":"badge-green", "None":"badge-red", "Exists":"badge-blue", "Not Mentioned":"badge-red" };

  return `<span class="badge ${m[status]||'badge-muted'}">${icons[status]||'?'} ${status}</span>`;
}
function posCell(pos) {
  if (!pos) return `<div class="pos-cell pos-red">50+</div>`;
  return `<div class="pos-cell pos-green">#${pos}</div>`;
}
function row(label, value, status) {

}
function gauge(score, max, label, color) {
  const pct = (score/max)*100;
  return `<div class="gauge"><div class="gauge-ring"><svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--border)" stroke-width="3"/><circle cx="18" cy="18" r="15.9" fill="none" stroke="${color}" stroke-width="3" stroke-dasharray="${pct} ${100-pct}" stroke-linecap="round"/></svg><div class="gauge-value">${score}<span>/${max}</span></div></div><div class="gauge-label">${label}</div></div>`;
}

// === INIT ===
const content = document.getElementById('content');
const tabBtns = document.querySelectorAll('.tab');

function showTab(id) {
  content.innerHTML = `<div class="tab-panel active">${panels[id]}</div>`;
  tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  // Rebind LLM expand
  if (id === 'llm') {
    document.querySelectorAll('.llm-prompt-row').forEach(row => {
      row.addEventListener('click', () => {
        const idx = row.dataset.idx;
        const detail = document.getElementById('detail-' + idx);
        const arrow = document.getElementById('arrow-' + idx);
        const isOpen = detail.classList.contains('show');
        document.querySelectorAll('.llm-detail').forEach(d => d.classList.remove('show'));
        document.querySelectorAll('.prompt-arrow').forEach(a => a.classList.remove('open'));
        document.querySelectorAll('.llm-prompt-row').forEach(r => r.classList.remove('expanded'));
        if (!isOpen) {
          detail.classList.add('show');
          arrow.classList.add('open');
          row.classList.add('expanded');
        }
      });
    });
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

tabBtns.forEach(btn => btn.addEventListener('click', () => showTab(btn.dataset.tab)));
